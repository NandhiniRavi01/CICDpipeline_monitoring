version: "3.8"

services:

  mongo:
    image: mongo:4.4.18
    container_name: mongo-db
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db   # persist database data
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example

  backend:
    build: .
    container_name: ecommerce-backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    environment:
      NODE_ENV: development
      MONGO_URI: "mongodb://root:example@mongo:27017/ecommerce?authSource=admin"

volumes:
  mongo-data:
